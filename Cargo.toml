[package]
name = "rounac"
version = "0.0.0"
edition = "2024"
rust-version = "1.96.0"
description = "A Rust interpretation of the OMS CAL specification."
repository = "https://github.com/rounac-crates/rounac"
readme = "README.md"
license = "MIT or Apache-2.0"

[dependencies]
rounac-agra = { version = "0.0.0", optional = true }
rounac-uci = { version = "0.0.0", optional = true }

[features]
agra-5_0 = ["rounac-uci:v5_0"]
uci-2_5 = ["rounac-uci:v2_5"]
